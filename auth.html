<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ponto — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #f5f5f7;
  --white:  #ffffff;
  --border: rgba(0,0,0,0.09);
  --blue:   #007aff;
  --blue-h: #0065d9;
  --blue-s: rgba(0,122,255,0.11);
  --green:  #34c759;
  --red:    #ff3b30;
  --t1:     #1d1d1f;
  --t2:     #3d3d3f;
  --t3:     #6e6e73;
  --t4:     #aeaeb2;
  --font:   'Plus Jakarta Sans', -apple-system, sans-serif;
  --r:      14px;
}
html { font-size: 15px; }
body {
  font-family: var(--font);
  background: var(--bg);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px 16px;
  -webkit-font-smoothing: antialiased;
}

/* bg decoration */
body::before {
  content: '';
  position: fixed; top: -40%; left: -20%;
  width: 700px; height: 700px; border-radius: 50%;
  background: radial-gradient(circle, rgba(0,122,255,.06) 0%, transparent 70%);
  pointer-events: none;
}

.card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 40px 40px 36px;
  width: 100%; max-width: 420px;
  box-shadow: 0 8px 40px rgba(0,0,0,.08), 0 1px 4px rgba(0,0,0,.04);
  animation: cardIn .35s cubic-bezier(.4,0,.2,1);
}
@keyframes cardIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

/* Header */
.logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; }
.logo-mark {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--blue); display: flex; align-items: center; justify-content: center;
  font-size: 22px; box-shadow: 0 4px 14px rgba(0,122,255,.32);
}
.logo-name { font-size: 18px; font-weight: 800; color: var(--t1); letter-spacing: -.4px; }
.logo-sub  { font-size: 12px; color: var(--t4); margin-top: 1px; }

/* Tabs */
.tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 4px; margin-bottom: 28px; }
.tab {
  flex: 1; padding: 9px; border: none; border-radius: 7px;
  font-family: var(--font); font-size: 13.5px; font-weight: 600;
  cursor: pointer; transition: all .16s; color: var(--t3); background: transparent;
}
.tab.on { background: var(--white); color: var(--t1); box-shadow: 0 1px 4px rgba(0,0,0,.1); }

/* Form */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--t3); margin-bottom: 7px; letter-spacing: .2px; }
.form-input {
  width: 100%; background: var(--bg); border: 1.5px solid rgba(0,0,0,.1);
  border-radius: 10px; padding: 12px 14px;
  font-family: var(--font); font-size: 14.5px; font-weight: 500; color: var(--t1);
  outline: none; transition: border-color .15s, box-shadow .15s;
}
.form-input::placeholder { color: var(--t4); font-weight: 400; }
.form-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px var(--blue-s); background: var(--white); }

.btn-main {
  width: 100%; background: var(--blue); color: #fff; border: none;
  border-radius: 12px; font-family: var(--font); font-size: 15px; font-weight: 700;
  padding: 14px; cursor: pointer; margin-top: 8px;
  transition: background .14s, transform .12s, box-shadow .14s;
  box-shadow: 0 2px 10px rgba(0,122,255,.3);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-main:hover   { background: var(--blue-h); transform: translateY(-1px); box-shadow: 0 4px 18px rgba(0,122,255,.35); }
.btn-main:active  { transform: translateY(0); }
.btn-main:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* Divider */
.divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
.divider::before, .divider::after { content:''; flex:1; height:1px; background: var(--border); }
.divider span { font-size: 12px; color: var(--t4); }

/* Alert */
.alert {
  padding: 12px 14px; border-radius: 10px; font-size: 13px; font-weight: 500;
  margin-bottom: 16px; display: none; align-items: center; gap: 8px;
}
.alert.error { background: rgba(255,59,48,.08); color: var(--red); border: 1px solid rgba(255,59,48,.2); display: flex; }
.alert.success { background: rgba(52,199,89,.08); color: var(--green); border: 1px solid rgba(52,199,89,.2); display: flex; }

/* Spinner */
.spin {
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4);
  border-top-color: #fff; border-radius: 50%;
  animation: spin .7s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

.footer-note { text-align: center; font-size: 12px; color: var(--t4); margin-top: 20px; }

@media (max-width: 480px) {
  .card { padding: 28px 22px 24px; border-radius: var(--r); }
}
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">⏱</div>
    <div>
      <div class="logo-name">Ponto Eletrônico</div>
      <div class="logo-sub">Registro de Horário</div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab on" id="tabLogin"     onclick="showTab('login')">Entrar</button>
    <button class="tab"    id="tabCadastro"  onclick="showTab('cadastro')">Criar conta</button>
  </div>

  <div id="alertBox" class="alert"></div>

  <!-- LOGIN -->
  <div id="formLogin">
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input type="email" class="form-input" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input type="password" class="form-input" id="loginSenha" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') fazerLogin()">
    </div>
    <button class="btn-main" id="btnLogin" onclick="fazerLogin()">
      <span class="spin" id="spinLogin"></span>
      <span id="lblLogin">Entrar</span>
    </button>
  </div>

  <!-- CADASTRO -->
  <div id="formCadastro" style="display:none">
    <div class="form-group">
      <label class="form-label">Nome completo</label>
      <input type="text" class="form-input" id="cadNome" placeholder="João Silva" autocomplete="name">
    </div>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input type="email" class="form-input" id="cadEmail" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input type="password" class="form-input" id="cadSenha" placeholder="Mínimo 6 caracteres" autocomplete="new-password">
    </div>
    <div class="form-group">
      <label class="form-label">Confirmar senha</label>
      <input type="password" class="form-input" id="cadSenha2" placeholder="Repita a senha" autocomplete="new-password"
             onkeydown="if(event.key==='Enter') fazerCadastro()">
    </div>
    <button class="btn-main" id="btnCadastro" onclick="fazerCadastro()">
      <span class="spin" id="spinCadastro"></span>
      <span id="lblCadastro">Criar conta</span>
    </button>
  </div>

  <div class="footer-note">Seus dados ficam protegidos e criptografados.</div>
</div>

<script>
// ── Supabase config ─────────────────────────────────────
// SUBSTITUA pelos seus valores do Supabase
const SUPABASE_URL    = 'sb_publishable_rlJB4BXNunswwc4-Pnsh0A_jRfL6BZ4';
const SUPABASE_ANON   = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB1cmhibHVnbHBkanVqcXBmam5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NTg4NTcsImV4cCI6MjA4OTMzNDg1N30.2bgOlsLu6Pb2ecyETbcR5wh6K9UGu5vOggrKXLcgqCA';

const sb = {
  headers: {
    'Content-Type': 'application/json',
    'apikey': SUPABASE_ANON,
    'Authorization': 'Bearer ' + SUPABASE_ANON,
  },

  async post(path, body, token) {
    const h = token
      ? { ...this.headers, 'Authorization': 'Bearer ' + token }
      : this.headers;
    const r = await fetch(SUPABASE_URL + path, {
      method: 'POST', headers: h, body: JSON.stringify(body)
    });
    return r.json();
  },

  async authPost(path, body) {
    const r = await fetch(SUPABASE_URL + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON },
      body: JSON.stringify(body)
    });
    return r.json();
  }
};

// ── Tab switching ────────────────────────────────────────
function showTab(tab) {
  document.getElementById('formLogin').style.display    = tab === 'login'    ? 'block' : 'none';
  document.getElementById('formCadastro').style.display = tab === 'cadastro' ? 'block' : 'none';
  document.getElementById('tabLogin').classList.toggle('on',    tab === 'login');
  document.getElementById('tabCadastro').classList.toggle('on', tab === 'cadastro');
  hideAlert();
}

// ── Alert helpers ────────────────────────────────────────
function showAlert(msg, type = 'error') {
  const el = document.getElementById('alertBox');
  el.textContent = msg;
  el.className = 'alert ' + type;
}
function hideAlert() {
  document.getElementById('alertBox').className = 'alert';
}

function setLoading(id, on) {
  document.getElementById('btn' + id).disabled = on;
  document.getElementById('spin' + id).style.display = on ? 'block' : 'none';
  document.getElementById('lbl'  + id).style.opacity = on ? '0' : '1';
}

// ── Already logged in? ───────────────────────────────────
(function checkSession() {
  const token = localStorage.getItem('ponto_token');
  if (token) { window.location.href = 'app.html'; }
})();

// ── Login ────────────────────────────────────────────────
async function fazerLogin() {
  hideAlert();
  const email = document.getElementById('loginEmail').value.trim();
  const senha = document.getElementById('loginSenha').value;

  if (!email || !senha) { showAlert('Preencha e-mail e senha.'); return; }

  setLoading('Login', true);
  try {
    const res = await sb.authPost('/auth/v1/token?grant_type=password', {
      email, password: senha
    });

    if (res.error || !res.access_token) {
      showAlert(res.error?.message || 'E-mail ou senha incorretos.');
      return;
    }

    // Save session
    localStorage.setItem('ponto_token',   res.access_token);
    localStorage.setItem('ponto_refresh',  res.refresh_token);
    localStorage.setItem('ponto_user_id',  res.user.id);
    localStorage.setItem('ponto_user_email', res.user.email);

    // Fetch profile to get name and role
    const profile = await fetchProfile(res.access_token, res.user.id);
    localStorage.setItem('ponto_user_nome', profile?.nome || email.split('@')[0]);
    localStorage.setItem('ponto_user_role', profile?.role || 'user');

    window.location.href = 'app.html';
  } catch (e) {
    showAlert('Erro de conexão. Tente novamente.');
  } finally {
    setLoading('Login', false);
  }
}

// ── Cadastro ─────────────────────────────────────────────
async function fazerCadastro() {
  hideAlert();
  const nome   = document.getElementById('cadNome').value.trim();
  const email  = document.getElementById('cadEmail').value.trim();
  const senha  = document.getElementById('cadSenha').value;
  const senha2 = document.getElementById('cadSenha2').value;

  if (!nome || !email || !senha) { showAlert('Preencha todos os campos.'); return; }
  if (senha.length < 6)          { showAlert('A senha deve ter ao menos 6 caracteres.'); return; }
  if (senha !== senha2)          { showAlert('As senhas não coincidem.'); return; }

  setLoading('Cadastro', true);
  try {
    // 1) Create auth user
    const res = await sb.authPost('/auth/v1/signup', { email, password: senha });

    if (res.error) { showAlert(res.error.message || 'Erro ao criar conta.'); return; }

    const userId = res.user?.id || res.id;
    const token  = res.access_token;

    // 2) Insert profile row
    await fetch(SUPABASE_URL + '/rest/v1/profiles', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON,
        'Authorization': 'Bearer ' + (token || SUPABASE_ANON),
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({ id: userId, nome, email, role: 'user' })
    });

    showAlert('Conta criada! Verifique seu e-mail e depois faça login.', 'success');
    setTimeout(() => showTab('login'), 2500);
  } catch (e) {
    showAlert('Erro de conexão. Tente novamente.');
  } finally {
    setLoading('Cadastro', false);
  }
}

// ── Fetch profile ─────────────────────────────────────────
async function fetchProfile(token, userId) {
  try {
    const r = await fetch(`${SUPABASE_URL}/rest/v1/profiles?id=eq.${userId}&select=nome,role`, {
      headers: { 'apikey': SUPABASE_ANON, 'Authorization': 'Bearer ' + token }
    });
    const data = await r.json();
    return data[0] || null;
  } catch { return null; }
}
</script>
</body>
</html>
